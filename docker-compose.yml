version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: project_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: dynamic_admin_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: project_redis
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: project_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build: ./backend
    container_name: project_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  frontend:
    build: ./frontend
    container_name: project_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: